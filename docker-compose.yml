networks:
  dev:


services:
  app:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://username:password@database:5432/shop
    networks:
      - dev

    ports:
      - "8000:8000"

  database:
    image: postgres
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    command: [ "postgres", "-c", "listen_addresses=*" ]
    networks:
      - dev

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - dev
    depends_on:
      - database

  frontend:
    build:
      context: ./social-network-v2
      dockerfile: ./Dockerfile
    networks:
      - dev
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf:ro'
    depends_on:
      - app
      - frontend
    networks:
      - dev
