user root;
worker_processes 1;

events {
    
}

http {
    # Базовые настройки
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Настройки SSL (общие для всех HTTPS серверов)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # HTTP сервер - перенаправляет на HTTPS
    server {
        listen 80;
        server_name socset.ddns.net localhost;
        
        # Для renew сертификатов Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }
        
        # Перенаправление всех остальных запросов на HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }
    
    # HTTPS сервер
    server {
        listen 443 ssl;
        http2 on;  # <-- ИСПРАВЛЕНО: http2 вынесен в отдельную директиву
        
        server_name socset.ddns.net localhost;
        
        # SSL сертификаты
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        # Прокси на frontend (React)
        location / {
            proxy_pass http://frontend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Прокси на API (Backend)
        location /api/ {
            proxy_pass http://app:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}